<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Background Grid -->
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#047857" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Deep HUD Background -->
  <rect width="100%" height="100%" fill="#022c22" opacity="0.95"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Scanning Ambient Ring -->
  <circle cx="250" cy="175" r="100" fill="none" stroke="#10b981" stroke-width="0.7" opacity="0.15"/>
  <circle cx="250" cy="175" r="60" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.1" stroke-dasharray="5 5"/>

  <!-- Crosshair elements -->
  <line x1="250" y1="50" x2="250" y2="300" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="175" x2="400" y2="175" stroke="#10b981" stroke-width="0.5" opacity="0.3"/>

  <!-- Glowing HUD Corner Brackets (Traditional outward/inward tech styling) -->
  <g stroke="#10b981" stroke-width="2" fill="none" filter="url(#glow-green)">
    <!-- Top-Left Bracket -->
    <path d="M 40,80 V 50 H 70"/>
    <rect x="45" y="45" width="4" height="4" fill="#10b981"/>
    <!-- Top-Right Bracket -->
    <path d="M 460,80 V 50 H 430"/>
    <rect x="451" y="45" width="4" height="4" fill="#10b981"/>
    <!-- Bottom-Left Bracket -->
    <path d="M 40,270 V 300 H 70"/>
    <rect x="45" y="301" width="4" height="4" fill="#10b981"/>
    <!-- Bottom-Right Bracket -->
    <path d="M 460,270 V 300 H 430"/>
    <rect x="451" y="301" width="4" height="4" fill="#10b981"/>
  </g>

  <!-- Centered Target Ring -->
  <g stroke="#f59e0b" stroke-width="1.5" fill="none" filter="url(#glow-amber)">
    <circle cx="250" cy="175" r="25"/>
    <path d="M 250,140 V 150 M 250,200 V 210 M 210,175 H 220 M 280,175 H 290"/>
  </g>

  <!-- Sci-Fi Telemetry & Overlay Labels -->
  <text x="50" y="35" font-family="Courier New, monospace" font-size="10" fill="#10b981" font-weight="bold">TARGET_ACQUISITION: ACTIVE</text>
  <text x="450" y="35" font-family="Courier New, monospace" font-size="10" fill="#10b981" font-weight="bold" text-anchor="end">RANGE: 1,618 M</text>
  
  <text x="50" y="325" font-family="Courier New, monospace" font-size="9" fill="#10b981" opacity="0.7">SECTOR: 07-D</text>
  <text x="450" y="325" font-family="Courier New, monospace" font-size="9" fill="#10b981" opacity="0.7" text-anchor="end">AZIMUTH: 294.4°</text>

  <!-- Sidebar metrics -->
  <g fill="#10b981" font-family="Courier New, monospace" font-size="9" opacity="0.8">
    <text x="55" y="110">SYS_V: 98.2%</text>
    <text x="55" y="130">PWR_S: AUX_ON</text>
    <text x="55" y="150">NET_L: SECURE</text>

    <!-- Small horizontal bar indicators -->
    <rect x="55" y="165" width="60" height="4" fill="#047857"/>
    <rect x="55" y="165" width="45" height="4" fill="#10b981" filter="url(#glow-green)"/>
  </g>

  <!-- Right sidebar gauge -->
  <g fill="#10b981" font-family="Courier New, monospace" font-size="9" opacity="0.8" text-anchor="end">
    <text x="445" y="110">TEMP: 24.5 C</text>
    <text x="445" y="130">RAD_L: 0.02 MSV</text>
    <text x="445" y="150">ATM_P: 1.01 BAR</text>

    <rect x="385" y="165" width="60" height="4" fill="#047857"/>
    <rect x="415" y="165" width="30" height="4" fill="#f59e0b" filter="url(#glow-amber)"/>
  </g>
</svg>
