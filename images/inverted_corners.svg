<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Background Grid -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1f2937" stroke-width="0.7" opacity="0.4"/>
    </pattern>
    <!-- Card Gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Deep Sci-Fi Background -->
  <rect width="100%" height="100%" fill="#030712"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Background Ambient Glow -->
  <circle cx="250" cy="175" r="120" fill="#06b6d4" opacity="0.08" filter="blur(40px)"/>

  <!-- Outer Frame Group with 50px margins -->
  <!-- Card dimensions: width 400, height 250, starting at (50, 50) -->
  <g transform="translate(0, 0)">
    <!-- Glassmorphic Card Background -->
    <path d="M 90,50 H 410 A 40,40 0 0 0 450,90 V 260 A 40,40 0 0 0 410,300 H 90 A 40,40 0 0 0 50,260 V 90 A 40,40 0 0 0 90,50 Z" 
          fill="url(#card-grad)" 
          stroke="#1e293b" 
          stroke-width="1.5"/>

    <!-- Glowing Cyan Border (slightly offset inside for styling) -->
    <path d="M 90,50 H 410 A 40,40 0 0 0 450,90 V 260 A 40,40 0 0 0 410,300 H 90 A 40,40 0 0 0 50,260 V 90 A 40,40 0 0 0 90,50 Z" 
          fill="none" 
          stroke="#06b6d4" 
          stroke-width="1.5" 
          filter="url(#glow-cyan)"
          stroke-dasharray="80 15 120 15 80 15 200 15"/>

    <!-- Corner Highlight Accents -->
    <!-- Top-Left Inverted Arc Highlight -->
    <path d="M 50,90 A 40,40 0 0 1 90,50" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#glow-cyan)"/>
    <!-- Bottom-Right Inverted Arc Highlight -->
    <path d="M 410,300 A 40,40 0 0 1 450,260" fill="none" stroke="#22d3ee" stroke-width="3" filter="url(#glow-cyan)"/>

    <!-- HUD Crosshairs at the corner centers -->
    <circle cx="50" cy="50" r="3" fill="#06b6d4" opacity="0.8"/>
    <line x1="40" y1="50" x2="60" y2="50" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <line x1="50" y1="40" x2="50" y2="60" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>

    <circle cx="450" cy="300" r="3" fill="#06b6d4" opacity="0.8"/>
    <line x1="440" y1="300" x2="460" y2="300" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>
    <line x1="450" y1="290" x2="450" y2="310" stroke="#06b6d4" stroke-width="0.5" opacity="0.5"/>

    <!-- Tech Typography / HUD Markings -->
    <text x="75" y="85" font-family="Courier New, monospace" font-size="10" fill="#0891b2" font-weight="bold" letter-spacing="1">SYS_STATUS: ONLINE</text>
    <text x="75" y="115" font-family="Segoe UI, sans-serif" font-size="20" fill="#f8fafc" font-weight="800" letter-spacing="0.5">CONCAVE MODULE</text>
    <text x="75" y="135" font-family="Segoe UI, sans-serif" font-size="11" fill="#94a3b8">Reverse border-radius: arc(R=40px)</text>

    <!-- Data Telemetry -->
    <rect x="75" y="160" width="10" height="2" fill="#06b6d4"/>
    <rect x="90" y="160" width="10" height="2" fill="#06b6d4"/>
    <rect x="105" y="160" width="10" height="2" fill="#38bdf8"/>
    <rect x="120" y="160" width="10" height="2" fill="#1e293b"/>
    <rect x="135" y="160" width="10" height="2" fill="#1e293b"/>

    <!-- Simulated Data Visualization (Graph) -->
    <path d="M 75,230 L 120,200 L 160,220 L 200,185 L 240,210 L 280,180" fill="none" stroke="#f97316" stroke-width="1.5" filter="url(#glow-orange)"/>
    <circle cx="280" cy="180" r="3" fill="#f97316"/>
    <text x="75" y="255" font-family="Courier New, monospace" font-size="9" fill="#f97316" font-weight="bold">TELEMETRY_ELEVATION: 1.618</text>

    <!-- UI Specs Guidelines -->
    <line x1="280" y1="110" x2="380" y2="110" stroke="#06b6d4" stroke-width="0.5" stroke-dasharray="2 2"/>
    <text x="300" y="105" font-family="Segoe UI, sans-serif" font-size="9" fill="#06b6d4">SECURE PROTOCOL</text>

    <!-- Lower Right Corner Label -->
    <text x="350" y="280" font-family="Courier New, monospace" font-size="9" fill="#64748b" text-anchor="end">COORD: [X-450, Y-300]</text>
  </g>
</svg>
