<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Background Grid -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#374151" stroke-width="0.7" opacity="0.4"/>
    </pattern>
    <!-- Card Gradient -->
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0c0a09" stop-opacity="0.98"/>
    </linearGradient>
  </defs>

  <!-- Deep Sci-Fi Background -->
  <rect width="100%" height="100%" fill="#0c0a09"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Background Ambient Glow -->
  <circle cx="250" cy="175" r="130" fill="#f97316" opacity="0.06" filter="blur(45px)"/>

  <!-- Card Frame Group -->
  <g transform="translate(0, 0)">
    <!-- Chamfered / Beveled Card Background -->
    <path d="M 80,50 H 420 L 450,80 V 270 L 420,300 H 80 L 50,270 V 80 Z" 
          fill="url(#card-grad)" 
          stroke="#44403c" 
          stroke-width="2"/>

    <!-- Glowing Orange Border -->
    <path d="M 80,50 H 420 L 450,80 V 270 L 420,300 H 80 L 50,270 V 80 Z" 
          fill="none" 
          stroke="#ea580c" 
          stroke-width="1.5" 
          filter="url(#glow-orange)"
          stroke-dasharray="100 20 80 20 180 20 60 20"/>

    <!-- Corner Highlight Accent cuts -->
    <path d="M 50,80 L 80,50" fill="none" stroke="#fdba74" stroke-width="3" filter="url(#glow-orange)"/>
    <path d="M 420,300 L 450,270" fill="none" stroke="#fdba74" stroke-width="3" filter="url(#glow-orange)"/>

    <!-- Warning Hatch Pattern (Industrual / Military HUD vibe) -->
    <g opacity="0.4">
      <line x1="65" y1="65" x2="75" y2="55" stroke="#f97316" stroke-width="2"/>
      <line x1="72" y1="65" x2="82" y2="55" stroke="#f97316" stroke-width="2"/>
      <line x1="79" y1="65" x2="89" y2="55" stroke="#f97316" stroke-width="2"/>
    </g>

    <!-- Tech Typography / HUD Markings -->
    <text x="90" y="85" font-family="Courier New, monospace" font-size="10" fill="#f97316" font-weight="bold" letter-spacing="1">UNIT: SHIELD_CONTROL</text>
    <text x="90" y="115" font-family="Segoe UI, sans-serif" font-size="20" fill="#f5f5f4" font-weight="800" letter-spacing="0.5">CHAMFERED PANEL</text>
    <text x="90" y="135" font-family="Segoe UI, sans-serif" font-size="11" fill="#a8a29e">45-degree linear cut: bevel(C=30px)</text>

    <!-- Simulated Dial Gauge -->
    <circle cx="120" cy="205" r="25" fill="none" stroke="#292524" stroke-width="6"/>
    <path d="M 102.32,222.68 A 25,25 0 1,1 137.68,222.68" fill="none" stroke="#ea580c" stroke-width="6" stroke-linecap="round" filter="url(#glow-orange)"/>
    <text x="120" y="210" font-family="Courier New, monospace" font-size="10" fill="#f5f5f4" font-weight="bold" text-anchor="middle">78%</text>
    <text x="120" y="245" font-family="Courier New, monospace" font-size="8" fill="#ea580c" text-anchor="middle">SHIELD_CAP</text>

    <!-- Secondary Gauge (Thermal) -->
    <circle cx="220" cy="205" r="25" fill="none" stroke="#292524" stroke-width="6"/>
    <path d="M 102.32,222.68 A 25,25 0 1,1 137.68,222.68" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round" filter="url(#glow-red)" transform="rotate(-40 220 205)"/>
    <text x="220" y="210" font-family="Courier New, monospace" font-size="10" fill="#f5f5f4" font-weight="bold" text-anchor="middle">54C</text>
    <text x="220" y="245" font-family="Courier New, monospace" font-size="8" fill="#dc2626" text-anchor="middle">THERMAL_T</text>

    <!-- Hexagonal or decorative detail lines -->
    <path d="M 330,175 H 410 L 420,185 V 230 L 410,240 H 330 Z" fill="#1c1917" stroke="#ea580c" stroke-width="0.5" opacity="0.6"/>
    <text x="375" y="200" font-family="Courier New, monospace" font-size="9" fill="#a8a29e" text-anchor="middle">MODULE: SC-01</text>
    <text x="375" y="215" font-family="Courier New, monospace" font-size="10" fill="#f5f5f4" font-weight="bold" text-anchor="middle">CONNECTED</text>

    <!-- Tech specs footnote -->
    <text x="420" y="280" font-family="Courier New, monospace" font-size="9" fill="#78716c" text-anchor="end">SYS_TYPE: CLASS_IV_BEVEL</text>
  </g>
</svg>
